# Specify where to look for JS packages when running `pnpm install`
# (which is required to generate the `pnpm-lock.yaml` used by both
# pnpm and bazel).
# A JS package is a subdirectory that contains a `package.json` file.
packages:
  - 'v1/proto'
  - 'v2alpha/proto'

# Packages with install/postinstall scripts that pnpm 10+ should run.
# Required by aspect_rules_js v3+; see
# https://pnpm.io/10.x/settings#onlybuiltdependencies
onlyBuiltDependencies: []
