// This file contains messages used to model antenna emissions.

syntax = "proto3";

package nmts.v1.types.physical;

option java_package = "org.outernetcouncil.nmts.v1.proto.types.physical";
option go_package = "outernetcouncil.org/nmts/v1/proto/types/physical";

// Power Spectral Density specifies the power.
message PowerSpectralDensity {
  oneof type {
    FixedPower fixed = 1;
    OffAxisPower off_axis = 3;
  }

  // Fixed power profile, that does not vary over angle or frequency.
  message FixedPower {
    // The maximum beam power transmitted, in dbW.
    // Required.
    double power_dbw = 1;
  }

  // Off-axis EIRP envelope as a piecewise-linear function of angle from
  // antenna's z-axis.
  // This matches how ITU/FCC regulatory filings express off-axis
  // EIRP density limits (e.g., 29 - 25·log(θ) dBW/4kHz).
  //
  // Control points define the envelope. Between control points, power is
  // linearly interpolated in dB. Below the smallest angle, the power of the
  // first control point applies. Above the largest angle, the power of the
  // last control point applies.
  message OffAxisPower {
    message ControlPoint {
      // Off-axis angle in degrees from the reference direction.
      // Required.
      double angle_deg = 1;

      // EIRP spectral density at this angle, in dBW per reference bandwidth.
      // Required.
      double power_dbw = 2;
    }

    // At least two control points are required, ordered by monotonically
    // increasing angle_deg.
    repeated ControlPoint control_points = 1;
  }

  // The reference bandwidth over which power_dbw applies, in Hz.
  // Required.
  double reference_bandwidth_hz = 2;
}

// Effective Isotropic Radiating Power Spectral Density mask.
message EirpsdMask {
  // Power Spectral Density for the mask.
  PowerSpectralDensity power_spectral_density = 1;

  // The frequency range over which this mask applies.
  // If unset the mask applies to all frequencies.
  FrequencyRange frequency_range = 2;
}

// Effective Isotropic Radiating Power (EIRP) limits.
message EirpLimits {
  // The maximum EIRP in the direction of a link is constrained by the following
  // factors, each of which is considered when present:
  //   - the gain in the link direction based on the antenna pattern (defined in
  //     Antenna.antenna_pattern) plus the per-carrier maximum transmit power
  //     (defined in CarrierConfiguration.TransmitCarrier.max_power_w) in dBW
  //   - maximum EIRP
  //   - maximum EIRP spectral density
  //   - PFD target of the link (defined in
  //     aalyria.spacetime.api.provisioning.v1alpha.EmissionsTarget).
  //
  // The following table describes how the maximum EIRP of a link is calculated
  // depending on which fields are present:
  //
  //
  // | EIRP limits | Antenna | Per-carrier max | EIRP Calculation                       |
  // |             | pattern | transmit power  |                                        |
  // |-------------|---------|-----------------|----------------------------------------|
  // | Yes         | Yes     | Yes             | The antenna pattern and per-carrier    |
  // |             |         |                 | max transmit power, as well as the     |
  // |             |         |                 | EIRP limits in this message, constrain |
  // |             |         |                 | the EIRP                               |
  // |-------------|---------|-----------------|----------------------------------------|
  // | Yes         | Yes     | No              | EIRP is constrained by the limits in   |
  // |             |         |                 | this message                           |
  // |-------------|---------|-----------------|----------------------------------------|
  // | Yes         | No      | Yes             | EIRP is constrained by the limits in   |
  // |             |         |                 | this message                           |
  // |-------------|---------|-----------------|----------------------------------------|
  // | Yes         | No      | No              | EIRP is constrained by the limits in   |
  // |             |         |                 | this message                           |
  // |-------------|---------|-----------------|----------------------------------------|
  // | No          | Yes     | Yes             | EIRP is constrained by the gain in the |
  // |             |         |                 | link direction and the per-carrier max |
  // |             |         |                 | transmit power                         |
  // |-------------|---------|-----------------|----------------------------------------|
  // | No          | Yes     | No              | Insufficient information; antenna will |
  // |             |         |                 | not be used to transmit                |
  // |-------------|---------|-----------------|----------------------------------------|
  // | No          | No      | Yes             | Insufficient information; antenna will |
  // |             |         |                 | not be used to transmit                |
  // |-------------|---------|-----------------|----------------------------------------|
  // | No          | No      | No              | Insufficient information; antenna will |
  // |             |         |                 | not be used to transmit                |
  // |-------------|---------|-----------------|----------------------------------------|
  //
  //
  // An EIRP limit in this message is required for the antenna to transmit
  // unless both Antenna.antenna_pattern and
  // CarrierConfiguration.TransmitCarrier.max_power_w are present.
  //
  // For multi-beam phased array antennas, this value should be interpreted as
  // the maximum EIRP of any beam.
  float maximum_eirp_dbw = 2;

  // The maximum permitted beam-peak EIRPSD, as a function of beam-pointing
  // direction. Bounds the main-lobe peak only. Side-lobe and grating-lobe
  // emissions must have been included in the assumptions used to compute the
  // main-lobe limit. The minimum applicable mask will be used.
  repeated EirpsdMask eirpsd_masks = 1;
}

// A range of frequencies.
message FrequencyRange {
  // The lower bound of the frequency range, in hertz (inclusive).
  int64 min_frequency_hz = 1;
  // The upper bound of the frequency range, in hertz (exclusive).
  int64 max_frequency_hz = 2;
}

// Power Flux Density.
message PowerFluxDensity {
  // The maximum beam power transmitted, in dbW/m^2.
  // Required.
  double dbw_per_m2 = 1;

  // The reference bandwidth over which power_dbw applies, in Hz.
  // Required.
  double reference_bandwidth_hz = 2;
}

// Characterizes an antenna's emissions for interference analysis.
//
// For external-system antennas (platforms with is_external_system set), this
// describes the worst-case emission envelope. For first-party antennas, this
// is optional and can be used for self-interference analysis.
message EmissionEnvelope {
  // One mask per frequency band the emitter operates in. Each mask describes
  // the worst-case EIRP spectral density over that band.
  //
  // When evaluating interference, only masks whose frequency_range overlaps
  // with the victim link's carrier are considered.
  repeated EirpsdMask eirpsd_masks = 1;
}
