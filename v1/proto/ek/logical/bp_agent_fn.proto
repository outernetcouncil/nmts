syntax = "proto3";

package nmts.v1.ek.logical;

option java_package = "org.outernetcouncil.nmts.v1.proto.ek.logical";
option go_package = "outernetcouncil.org/nmts/v1/proto/ek/logical";

// Entity Kind: Bundle Protocol Agent Function (`EK_BP_AGENT_FN`)
//
// A Bundle Protocol Agent Function, presummably BPv7 (RFC 9171,
// et al.).
message BpAgentFn {
  // A hard limit on the storage capacity of this Bundle Protocol
  // Agent, in bytes.
  //
  // In other words, if the number of bytes required to be stored
  // at a particular time by this BP Agent exceeds this limit, the
  // BP Agent would need to determine which bytes to drop (incoming,
  // previously stored, or some mix of the two), per local policy.
  int64 max_capacity_bytes = 1;  // ~8 exabytes

  // The IPN Administrative Endpoint ID of this BP Agent, expressed as
  // an 'ipn' scheme URI (RFC 9171 §4.2.5.2, RFC 9758).
  //
  // RFC 9758 defines the canonical three-component text form:
  //
  //   ipn:<allocator_id>.<node_nbr>.<service_nbr>
  //
  // The IPN Administrative Endpoint ID is a Singleton EID, so the
  // service_nbr component is always 0. The allocator_id identifies the
  // Numbering Authority that assigned the node_nbr; allocator_id 0
  // denotes the IANA Default Allocator (RFC 9758 §3.2.2), which is
  // backward-compatible with the two-component form defined in RFC 7116.
  //
  // The two-component form (e.g. "ipn:15.0") from RFC 7116 is still
  // valid and equivalent to "ipn:0.15.0", but new configurations
  // SHOULD use the three-component form.
  //
  // Examples (allocator_id 974849 is in the RFC 9758 Example Range,
  // 0xEE000-0xEEFFF, reserved for documentation purposes):
  //   "ipn:0.15.0"          -- node 15, IANA Default Allocator
  //   "ipn:974849.7.0"      -- node 7, non-default allocator
  string ipn_admin_eid = 2;

  // TODO: add CLA capabilities attributes.
}
